<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI 계정 사용량</title>
  <style>
    :root{color-scheme:dark;--bg:#101116;--panel:#191b22;--line:#292c36;--text:#f4f5f7;--muted:#9298a6;--accent:#8c7cff;--warn:#ffbd59;--danger:#ff6f7d}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding:0 10px 12px;user-select:none}button,select{font:inherit;-webkit-app-region:no-drag}
    header{-webkit-app-region:drag;position:sticky;top:0;z-index:5;height:48px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(var(--bg) 84%,transparent)}.title-wrap{display:flex;align-items:baseline;gap:9px}h1{margin:0;font-size:16px}.header-actions{display:flex;gap:6px}.icon-button{width:32px;height:32px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--muted);cursor:pointer}
    #summary{color:var(--muted);font-size:10px}#summary.warning{color:var(--warn)}#cards{display:grid;gap:8px}.card{--provider-accent:var(--accent);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(145deg,#1c1e27,#171920)}.card-head,.provider,.usage-head,.usage-bottom,.chip-rail{display:flex;align-items:center}.card-head{justify-content:space-between;gap:10px;min-height:30px}.provider{gap:8px;min-width:0}.logo{width:22px;height:22px;flex:none;display:grid;place-items:center;overflow:hidden;border-radius:7px;background:#282b37;color:var(--provider-accent);font-size:10px;font-weight:800}.logo img{width:100%;height:100%;object-fit:cover}.provider h2{margin:0;font-size:13px}.account-select{width:min(230px,65%);min-width:0;height:30px;border:1px solid var(--line);border-radius:8px;padding:4px 7px;background:#12141a;color:var(--text)}.account-select:disabled{opacity:.5}.chip-rail{min-height:18px;margin-top:5px;justify-content:flex-end;flex-wrap:wrap;gap:4px}.chip{height:18px;padding:1px 6px;border-radius:999px;background:#2a2d36;color:#c4c7cf;font-size:10px;line-height:16px}.chip.current{background:rgba(64,190,120,.16);color:#72dda5}.chip.dap{background:rgba(92,106,230,.18);color:#aeb7ff}.card-live{min-height:0;color:var(--muted);font-size:10px}
    .usage{margin-top:8px;border-top:1px solid var(--line)}.metric{padding:8px 0}.metric+.metric{border-top:1px solid rgba(255,255,255,.07)}.usage-head{justify-content:space-between;gap:8px;margin-bottom:6px}.usage-label{color:#d5d7de;font-size:11px}.usage-value{font-variant-numeric:tabular-nums;font-size:11px;font-weight:700}.usage-bottom{gap:9px}.bar{height:6px;min-width:40px;flex:1;overflow:hidden;border-radius:99px;background:#2b2e39}.bar i{display:block;height:100%;border-radius:inherit;background:var(--provider-accent)}.bar.warn i{background:var(--warn)}.bar.danger i{background:var(--danger)}.reset{max-width:44%;overflow:hidden;color:var(--muted);font-size:10px;text-overflow:ellipsis;white-space:nowrap;text-align:right}
    #settings-note{margin:8px 2px 0;text-align:right}#open-settings{border:0;background:transparent;color:#c8c2ff;font-size:11px;cursor:pointer;text-decoration:underline}.notice{padding:22px 16px;border:1px dashed #343746;border-radius:12px;text-align:center;color:var(--muted)}.notice strong{display:block;color:var(--text)}#toast{position:fixed;left:12px;right:12px;bottom:12px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#252833;opacity:0;transform:translateY(6px);pointer-events:none;transition:.18s}#toast.show{opacity:1;transform:none}#toast.error{color:#ffb0b8}.spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:359px){header{height:auto;min-height:48px;flex-wrap:wrap}.card-head{align-items:flex-start;flex-wrap:wrap}.account-select{width:100%;max-width:none;flex-basis:100%}}@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <header><div class="title-wrap"><h1>AI 계정 사용량</h1><span id="summary">확인 중…</span></div><div class="header-actions"><button id="refresh" class="icon-button" aria-label="새로고침">↻</button><button id="close" class="icon-button" aria-label="닫기">×</button></div></header>
  <main id="cards" aria-live="polite"><div class="notice"><strong>불러오는 중</strong>계정을 확인하고 있습니다.</div></main>
  <p id="settings-note"><button id="open-settings">DAP 계정 설정…</button></p>
  <div id="toast" role="status"></div>
  <script>
    const cards=document.getElementById("cards"),summary=document.getElementById("summary"),refresh=document.getElementById("refresh"),toast=document.getElementById("toast");
    const icons={codex:"../assets/codex.png",openai:"../assets/codex.png",claude:"../assets/claude.png",anthropic:"../assets/claude.png"};let providers=[],toastTimer,usageRequestSequence=0;
    const send=(message)=>window.dapPalette.postMessage(message);const esc=(value)=>{const n=document.createElement("span");n.textContent=String(value??"");return n.innerHTML};const attr=(value)=>esc(value).replaceAll('"',"&quot;").replaceAll("'","&#39;");
    function icon(provider){const src=icons[String(provider.id).toLowerCase()];return src?`<span class="logo" aria-hidden="true"><img src="${src}" alt="" /></span>`:`<span class="logo" aria-hidden="true">${esc(String(provider.name||"AI").slice(0,2).toUpperCase())}</span>`}
    function resetText(item){if(!item?.resetAt)return item?.detail||"조회 불가";const delta=new Date(item.resetAt)-Date.now();if(delta<=0)return"초기화 예정";const minutes=Math.ceil(delta/60000),hours=Math.floor(minutes/60);return item.detail||(hours?`${hours}시간 ${minutes%60}분 후`:`${minutes}분 후`)}
    function metric(item,kind,provider,account){const label=kind==="five-hour"?"5시간":"주간",used=Number.isFinite(Number(item?.usedPercent))?Math.max(0,Math.min(100,Number(item.usedPercent))):null,value=used===null?"—":`${Math.round(used)}% 사용`,resetValue=resetText(item),severity=used>=90?"danger":used>=70?"warn":"",severityText=used>=90?"위험":used>=70?"주의":"정상",who=account?.email||account?.label||"계정";return `<section class="metric"><div class="usage-head"><span class="usage-label">${label}</span><span class="usage-value">${value}</span></div><div class="usage-bottom"><div class="bar ${severity}" role="progressbar" aria-label="${attr(`${provider.name}, ${who}, ${label}, ${used===null?"조회 불가":`${Math.round(used)}퍼센트 사용, ${severityText}`}`)}" aria-valuemin="0" aria-valuemax="100"${used===null?"":` aria-valuenow="${used}"`}><i style="width:${used??0}%"></i></div><div class="reset" title="${attr(resetValue)}">${esc(resetValue)}</div></div></section>`}
    function usage(provider,account){const list=account?.usage||[],five=list.find(i=>i.kind==="five-hour"),weekly=list.find(i=>i.kind==="weekly"),who=account?.email||account?.label||"계정";return `<div class="usage" role="group" aria-label="${attr(`${provider.name}, ${who} 사용량`)}">${metric(five,"five-hour",provider,account)}${metric(weekly,"weekly",provider,account)}</div>`}
    function chips(account){if(!account)return"";const items=[];if(account.active)items.push('<span class="chip current" aria-label="현재 서비스에서 사용 중">현재 사용 중</span>');if(account.dapActive)items.push('<span class="chip dap" aria-label="DAP에서 사용 중">DAP</span>');if(account.accountType==="business")items.push('<span class="chip" aria-label="회사 계정">회사</span>');else if(account.accountType==="personal")items.push('<span class="chip" aria-label="개인 계정">개인</span>');return items.length?`<div class="chip-rail" role="group" aria-label="선택된 계정 상태">${items.join("")}</div>`:""}
    function providerCard(provider){const accounts=provider.accounts||[],active=accounts.find(a=>a.active)||null,selectedId=provider._selectedId||active?.accountId||active?.id||accounts[0]?.accountId||accounts[0]?.id||"",selected=accounts.find(a=>(a.accountId||a.id)===selectedId)||active||accounts[0]||null;provider._selectedId=selectedId;const accountOptions=accounts.map(a=>{const id=a.accountId||a.id;return `<option value="${attr(id)}" ${id===selectedId?"selected":""}>${esc(a.label||a.email||id)}</option>`}).join("");const addOption=provider.canAdd?'<option disabled>──────────</option><option value="__add__" data-action="add">+ 새 계정 추가…</option>':"";const options=accounts.length?accountOptions+addOption:provider.canAdd?'<option value="">연결된 계정 없음</option>'+addOption:'<option>연결된 계정 없음 · 추가 미지원</option>';const accent=/claude|anthropic/i.test(provider.id)?"#d97757":"#8c7cff";return `<article class="card" style="--provider-accent:${accent}" data-provider="${attr(provider.id)}"><div class="card-head"><div class="provider">${icon(provider)}<h2>${esc(provider.name)}</h2></div><select class="account-select" aria-label="${attr(provider.name)} 계정" ${accounts.length||provider.canAdd?"":"disabled"}>${options}</select></div>${chips(selected)}<div class="card-live" aria-live="polite"></div>${usage(provider,selected)}</article>`}
    function render(message){refresh.disabled=false;refresh.classList.remove("spin");summary.classList.toggle("warning",Boolean(message.warning));summary.textContent=message.warning||(message.updatedAt?`마지막 확인 ${new Date(message.updatedAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"계정 상태");providers=Array.isArray(message.providers)?message.providers:[];cards.innerHTML=providers.length?providers.map(providerCard).join(""):`<div class="notice"><strong>${message.unsupported?"DAP 지원이 필요합니다":"연결된 서비스가 없습니다"}</strong>${esc(message.error||message.message||"계정 연결을 확인해 주세요.")}</div>`}
    function show(message,error=false){clearTimeout(toastTimer);toast.textContent=message;toast.className=`show${error?" error":""}`;toastTimer=setTimeout(()=>toast.className="",2700)}
    window.dapPalette.onMessage((message)=>{if(message?.type==="loading"){refresh.disabled=true;refresh.classList.add("spin");summary.textContent="확인 중…"}else if(message?.type==="overview")render(message);else if(message?.type==="account-usage"){const provider=providers.find(p=>p.id===message.providerId);if(!provider||message.requestId!==provider._requestId)return;const account=provider.accounts?.find(a=>(a.accountId||a.id)===message.accountId),isSelected=provider._selectedId===message.accountId;if(account&&!message.error){account.usage=message.usage;if(isSelected){const card=[...cards.querySelectorAll(".card")].find(item=>item.dataset.provider===message.providerId);card?.querySelector(".usage")?.replaceWith(new DOMParser().parseFromString(usage(provider,account),"text/html").body.firstElementChild)}}if(message.error&&isSelected)show(message.error,true)}else if(message?.type==="add-result"||message?.type==="settings-result")show(message.message,!message.ok)});
    cards.addEventListener("change",event=>{const select=event.target.closest(".account-select");if(!select)return;const provider=providers.find(p=>p.id===select.closest(".card").dataset.provider);if(select.selectedOptions[0]?.dataset.action==="add"){select.value=provider._selectedId||"";select.closest(".card").querySelector(".card-live").textContent="로그인 대기 중…";send({type:"add-account",providerId:provider.id});return}provider._selectedId=select.value;const account=provider.accounts.find(a=>(a.accountId||a.id)===select.value);select.closest(".card").outerHTML=providerCard(provider);if(provider.canQueryUsage){provider._requestId=++usageRequestSequence;send({type:"query-account-usage",requestId:provider._requestId,providerId:provider.id,accountId:select.value})}});
    refresh.onclick=()=>send({type:"refresh"});document.getElementById("open-settings").onclick=()=>send({type:"open-account-settings"});document.getElementById("close").onclick=()=>window.dapPalette.close();send({type:"ready"});
  </script>
</body>
</html>
