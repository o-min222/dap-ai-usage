<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI 계정 사용량</title>
  <style>
    :root{color-scheme:dark;--bg:#101116;--panel:#191b22;--line:#292c36;--text:#f4f5f7;--muted:#9298a6;--accent:#8c7cff;--warn:#ffbd59;--danger:#ff6f7d}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{padding:0 10px 12px;user-select:none}button{font:inherit;-webkit-app-region:no-drag}
    header{-webkit-app-region:drag;position:sticky;top:0;z-index:5;height:48px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(var(--bg) 84%,transparent)}.title-wrap{display:flex;align-items:baseline;gap:9px}h1{margin:0;font-size:16px}.header-actions{display:flex;gap:6px}.icon-button{width:32px;height:32px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--muted);cursor:pointer}
    #summary{color:var(--muted);font-size:10px}#summary.warning{color:var(--warn)}#cards{display:grid;gap:8px}.card{--provider-accent:var(--accent);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(145deg,#1c1e27,#171920)}.card-head,.provider,.chip-rail,.account-trigger,.account-option,.account-add{display:flex;align-items:center}.card-head{justify-content:space-between;gap:10px;min-height:30px}.provider{gap:8px;min-width:0}.logo{width:22px;height:22px;flex:none;display:grid;place-items:center;overflow:hidden;border-radius:7px;background:#282b37;color:var(--provider-accent);font-size:10px;font-weight:800}.logo img{width:100%;height:100%;object-fit:cover}.provider h2{margin:0;font-size:13px}.account-picker{position:relative;width:min(230px,65%);min-width:0}.account-trigger{width:100%;height:30px;justify-content:space-between;gap:8px;border:1px solid #343846;border-radius:8px;padding:0 9px;background:linear-gradient(180deg,#171922,#12141a);color:var(--text);cursor:pointer;box-shadow:inset 0 1px rgba(255,255,255,.025)}.account-trigger:hover,.account-trigger[aria-expanded="true"]{border-color:#4b5062;background:#1b1e27}.account-trigger:focus-visible{outline:2px solid color-mix(in srgb,var(--provider-accent) 70%,white);outline-offset:2px}.account-trigger:disabled{cursor:default;opacity:.5}.account-trigger-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}.chevron{flex:none;color:#858c9c;font-size:10px;transition:transform .15s}.account-trigger[aria-expanded="true"] .chevron{transform:rotate(180deg)}.account-menu{position:absolute;z-index:30;top:36px;right:0;width:min(280px,82vw);padding:5px;border:1px solid #383c49;border-radius:10px;background:#22252e;box-shadow:0 14px 34px rgba(0,0,0,.42)}.account-menu[hidden]{display:none}.account-option,.account-add{width:100%;min-height:36px;gap:8px;border:0;border-radius:7px;padding:7px 8px;background:transparent;color:var(--text);cursor:pointer;text-align:left}.account-option:hover,.account-option:focus-visible,.account-option.selected{outline:0;background:#2b2f3a}.account-option.selected{box-shadow:inset 2px 0 var(--provider-accent)}.account-copy{min-width:0;flex:1}.account-name{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.account-hint{display:block;margin-top:1px;color:var(--muted);font-size:9px}.account-check{width:14px;flex:none;color:var(--provider-accent);font-weight:800;text-align:center}.account-add{margin-top:3px;justify-content:center;background:color-mix(in srgb,var(--provider-accent) 10%,transparent);color:#d8d4ff;font-size:11px}.account-add:hover,.account-add:focus-visible{outline:0;background:color-mix(in srgb,var(--provider-accent) 18%,transparent)}.chip-rail{min-height:18px;margin-top:5px;justify-content:flex-end;flex-wrap:wrap;gap:4px}.chip{height:18px;padding:1px 6px;border-radius:999px;background:#2a2d36;color:#c4c7cf;font-size:10px;line-height:16px}.chip.current{background:rgba(64,190,120,.16);color:#72dda5}.chip.dap{background:rgba(92,106,230,.18);color:#aeb7ff}.card-live{min-height:0;color:var(--muted);font-size:10px}
    .usage{display:grid;gap:8px;margin-top:10px}.metric{display:grid;grid-template-columns:34px minmax(54px,1fr) 52px minmax(68px,auto);align-items:center;gap:8px;min-height:18px}.usage-label{color:#d5d7de;font-size:11px}.usage-value{font-variant-numeric:tabular-nums;font-size:11px;font-weight:700;text-align:right;white-space:nowrap}.bar{height:6px;min-width:0;overflow:hidden;border-radius:99px;background:#2b2e39}.bar i{display:block;height:100%;border-radius:inherit;background:var(--provider-accent)}.bar.warn i{background:var(--warn)}.bar.danger i{background:var(--danger)}.reset{max-width:92px;overflow:hidden;color:var(--muted);font-size:10px;text-overflow:ellipsis;white-space:nowrap;text-align:right}
    #settings-note{margin:8px 2px 0;text-align:right}#open-settings{border:0;background:transparent;color:#c8c2ff;font-size:11px;cursor:pointer;text-decoration:underline}.notice{padding:22px 16px;border:1px dashed #343746;border-radius:12px;text-align:center;color:var(--muted)}.notice strong{display:block;color:var(--text)}#toast{position:fixed;left:12px;right:12px;bottom:12px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#252833;opacity:0;transform:translateY(6px);pointer-events:none;transition:.18s}#toast.show{opacity:1;transform:none}#toast.error{color:#ffb0b8}.spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:359px){header{height:auto;min-height:48px;flex-wrap:wrap}.card-head{align-items:flex-start;flex-wrap:wrap}.account-picker{width:100%;max-width:none;flex-basis:100%}.account-menu{left:0;right:0;width:100%}}@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <header><div class="title-wrap"><h1>AI 계정 사용량</h1><span id="summary">확인 중…</span></div><div class="header-actions"><button id="refresh" class="icon-button" aria-label="새로고침">↻</button><button id="close" class="icon-button" aria-label="닫기">×</button></div></header>
  <main id="cards" aria-live="polite"><div class="notice"><strong>불러오는 중</strong>계정을 확인하고 있습니다.</div></main>
  <p id="settings-note"><button id="open-settings">DAP 계정 설정…</button></p>
  <div id="toast" role="status"></div>
  <script>
    const cards=document.getElementById("cards"),summary=document.getElementById("summary"),refresh=document.getElementById("refresh"),toast=document.getElementById("toast");
    const icons={codex:"../assets/codex.png",openai:"../assets/codex.png",claude:"../assets/claude.png",anthropic:"../assets/claude.png"};let providers=[],toastTimer,usageRequestSequence=0;const pendingAdds=new Map();
    const bridge=window.dapPalette||{postMessage(){},onMessage(){return()=>{}},close(){}};if(!window.dapPalette)window.dapPalette=bridge;const send=(message)=>bridge.postMessage(message);const esc=(value)=>{const n=document.createElement("span");n.textContent=String(value??"");return n.innerHTML};const attr=(value)=>esc(value).replaceAll('"',"&quot;").replaceAll("'","&#39;");
    function icon(provider){const src=icons[String(provider.id).toLowerCase()];return src?`<span class="logo" aria-hidden="true"><img src="${src}" alt="" /></span>`:`<span class="logo" aria-hidden="true">${esc(String(provider.name||"AI").slice(0,2).toUpperCase())}</span>`}
    function resetText(item){if(!item?.resetAt)return item?.detail||"조회 불가";const delta=new Date(item.resetAt)-Date.now();if(delta<=0)return"초기화 예정";const minutes=Math.ceil(delta/60000),hours=Math.floor(minutes/60);return item.detail||(hours?`${hours}시간 ${minutes%60}분 후`:`${minutes}분 후`)}
    function metric(item,kind,provider,account){const label=kind==="five-hour"?"5시간":"주간",used=Number.isFinite(Number(item?.usedPercent))?Math.max(0,Math.min(100,Number(item.usedPercent))):null,value=used===null?"—":`${Math.round(used)}% 사용`,resetValue=resetText(item),severity=used>=90?"danger":used>=70?"warn":"",severityText=used>=90?"위험":used>=70?"주의":"정상",who=account?.email||account?.label||"계정";return `<section class="metric"><span class="usage-label">${label}</span><div class="bar ${severity}" role="progressbar" aria-label="${attr(`${provider.name}, ${who}, ${label}, ${used===null?"조회 불가":`${Math.round(used)}퍼센트 사용, ${severityText}`}`)}" aria-valuemin="0" aria-valuemax="100"${used===null?"":` aria-valuenow="${used}"`}><i style="width:${used??0}%"></i></div><span class="usage-value">${value}</span><span class="reset" title="${attr(resetValue)}">${esc(resetValue)}</span></section>`}
    function usage(provider,account){const list=account?.usage||[],five=list.find(i=>i.kind==="five-hour"),weekly=list.find(i=>i.kind==="weekly"),who=account?.email||account?.label||"계정";return `<div class="usage" role="group" aria-label="${attr(`${provider.name}, ${who} 사용량`)}">${metric(five,"five-hour",provider,account)}${metric(weekly,"weekly",provider,account)}</div>`}
    function chips(account){if(!account)return"";const items=[];if(account.active)items.push('<span class="chip current" aria-label="현재 서비스에서 사용 중">현재 사용 중</span>');if(account.dapActive)items.push('<span class="chip dap" aria-label="DAP에서 사용 중">DAP</span>');if(account.accountType==="business")items.push('<span class="chip" aria-label="회사 계정">회사</span>');else if(account.accountType==="personal")items.push('<span class="chip" aria-label="개인 계정">개인</span>');return items.length?`<div class="chip-rail" role="group" aria-label="선택된 계정 상태">${items.join("")}</div>`:""}
    function accountPicker(provider,accounts,selected){const selectedId=selected?.accountId||selected?.id||"",selectedName=selected?.label||selected?.email||"계정 선택",menuId=`account-menu-${String(provider.id).replace(/[^a-z0-9_-]/gi,"-")}`,options=accounts.map(account=>{const id=account.accountId||account.id,name=account.label||account.email||id,hints=[account.active?"현재 사용 중":"",account.dapActive?"DAP":"",account.accountType==="business"?"회사":account.accountType==="personal"?"개인":""].filter(Boolean).join(" · ");return `<button class="account-option${id===selectedId?" selected":""}" type="button" role="menuitemradio" aria-checked="${id===selectedId}" tabindex="-1" data-account-id="${attr(id)}"><span class="account-copy"><span class="account-name">${esc(name)}</span>${hints?`<span class="account-hint">${esc(hints)}</span>`:""}</span><span class="account-check" aria-hidden="true">${id===selectedId?"✓":""}</span></button>`}).join("");const empty=accounts.length?"":'<div class="account-option" role="menuitem" aria-disabled="true"><span class="account-copy"><span class="account-name">연결된 계정 없음</span><span class="account-hint">새 계정을 연결해 주세요</span></span></div>',add=provider.canAdd?'<button class="account-add" type="button" role="menuitem" tabindex="-1" data-action="add">＋ 다른 계정 연결</button>':"";return `<div class="account-picker"><button class="account-trigger" type="button" aria-label="${attr(`${provider.name} 계정, ${selectedName}`)}" aria-haspopup="menu" aria-expanded="false" aria-controls="${attr(menuId)}" ${accounts.length||provider.canAdd?"":"disabled"}><span class="account-trigger-label">${esc(selectedName)}</span><span class="chevron" aria-hidden="true">▾</span></button><div class="account-menu" id="${attr(menuId)}" role="menu" aria-label="${attr(provider.name)} 계정" hidden>${options}${empty}${add}</div></div>`}
    function providerCard(provider){const accounts=provider.accounts||[],active=accounts.find(a=>a.active)||null,selectedId=provider._selectedId||active?.accountId||active?.id||accounts[0]?.accountId||accounts[0]?.id||"",selected=accounts.find(a=>(a.accountId||a.id)===selectedId)||active||accounts[0]||null;provider._selectedId=selected?.accountId||selected?.id||"";const accent=/claude|anthropic/i.test(provider.id)?"#d97757":"#8c7cff";return `<article class="card" style="--provider-accent:${accent}" data-provider="${attr(provider.id)}"><div class="card-head"><div class="provider">${icon(provider)}<h2>${esc(provider.name)}</h2></div>${accountPicker(provider,accounts,selected)}</div>${chips(selected)}<div class="card-live" aria-live="polite"></div>${usage(provider,selected)}</article>`}
    function render(message){refresh.disabled=false;refresh.classList.remove("spin");summary.classList.toggle("warning",Boolean(message.warning));summary.textContent=message.warning||(message.updatedAt?`마지막 확인 ${new Date(message.updatedAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`:"계정 상태");const previous=new Map(providers.map(provider=>[provider.id,provider._selectedId]));providers=Array.isArray(message.providers)?message.providers:[];for(const provider of providers){const known=pendingAdds.get(provider.id),added=known&&provider.accounts?.find(account=>!known.has(account.accountId||account.id)),preserved=previous.get(provider.id);if(added){provider._selectedId=added.accountId||added.id;pendingAdds.delete(provider.id)}else if(preserved&&provider.accounts?.some(account=>(account.accountId||account.id)===preserved))provider._selectedId=preserved}cards.innerHTML=providers.length?providers.map(providerCard).join(""):`<div class="notice"><strong>${message.unsupported?"DAP 지원이 필요합니다":"연결된 서비스가 없습니다"}</strong>${esc(message.error||message.message||"계정 연결을 확인해 주세요.")}</div>`}
    function show(message,error=false){clearTimeout(toastTimer);toast.textContent=message;toast.className=`show${error?" error":""}`;toastTimer=setTimeout(()=>toast.className="",2700)}
    window.dapPalette.onMessage((message)=>{if(message?.type==="loading"){refresh.disabled=true;refresh.classList.add("spin");summary.textContent="확인 중…"}else if(message?.type==="overview")render(message);else if(message?.type==="account-usage"){const provider=providers.find(p=>p.id===message.providerId);if(!provider||message.requestId!==provider._requestId)return;const account=provider.accounts?.find(a=>(a.accountId||a.id)===message.accountId),isSelected=provider._selectedId===message.accountId;if(account&&!message.error){account.usage=message.usage;if(isSelected){const card=[...cards.querySelectorAll(".card")].find(item=>item.dataset.provider===message.providerId);card?.querySelector(".usage")?.replaceWith(new DOMParser().parseFromString(usage(provider,account),"text/html").body.firstElementChild)}}if(message.error&&isSelected)show(message.error,true)}else if(message?.type==="add-result"){if(!message.ok)pendingAdds.delete(message.providerId);show(message.message,!message.ok)}else if(message?.type==="settings-result")show(message.message,!message.ok)});
    function closeMenus(except){for(const picker of cards.querySelectorAll(".account-picker")){if(picker===except)continue;picker.querySelector(".account-menu").hidden=true;picker.querySelector(".account-trigger").setAttribute("aria-expanded","false")}}
    cards.addEventListener("click",event=>{const card=event.target.closest(".card"),provider=card&&providers.find(item=>item.id===card.dataset.provider);if(!provider)return;const trigger=event.target.closest(".account-trigger");if(trigger){const picker=trigger.closest(".account-picker"),menu=picker.querySelector(".account-menu"),willOpen=menu.hidden;closeMenus(picker);menu.hidden=!willOpen;trigger.setAttribute("aria-expanded",String(willOpen));if(willOpen)menu.querySelector(".account-option.selected,.account-option[data-account-id],.account-add")?.focus();return}const add=event.target.closest('[data-action="add"]');if(add){pendingAdds.set(provider.id,new Set((provider.accounts||[]).map(account=>account.accountId||account.id)));closeMenus();card.querySelector(".card-live").textContent="로그인 대기 중…";send({type:"add-account",providerId:provider.id});return}const option=event.target.closest(".account-option[data-account-id]");if(!option)return;const accountId=option.dataset.accountId;provider._selectedId=accountId;const account=provider.accounts.find(item=>(item.accountId||item.id)===accountId);card.outerHTML=providerCard(provider);const nextCard=[...cards.querySelectorAll(".card")].find(item=>item.dataset.provider===provider.id);nextCard?.querySelector(".account-trigger")?.focus();if(provider.canQueryUsage){provider._requestId=++usageRequestSequence;send({type:"query-account-usage",requestId:provider._requestId,providerId:provider.id,accountId})}});
    cards.addEventListener("keydown",event=>{const menu=event.target.closest(".account-menu");if(!menu)return;if(event.key==="Tab"){closeMenus();return}if(!["ArrowDown","ArrowUp","Home","End"].includes(event.key))return;const items=[...menu.querySelectorAll(".account-option[data-account-id],.account-add")];if(!items.length)return;event.preventDefault();const current=Math.max(0,items.indexOf(document.activeElement)),next=event.key==="Home"?0:event.key==="End"?items.length-1:event.key==="ArrowDown"?(current+1)%items.length:(current-1+items.length)%items.length;items[next].focus()});document.addEventListener("click",event=>{if(!event.target.closest(".account-picker"))closeMenus()});document.addEventListener("keydown",event=>{if(event.key==="Escape"){const trigger=document.querySelector(".account-trigger[aria-expanded='true']");closeMenus();trigger?.focus()}});
    refresh.onclick=()=>send({type:"refresh"});document.getElementById("open-settings").onclick=()=>send({type:"open-account-settings"});document.getElementById("close").onclick=()=>window.dapPalette.close();send({type:"ready"});
  </script>
</body>
</html>
